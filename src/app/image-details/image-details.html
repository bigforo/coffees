<!-- top-right info button + panel -->
<button
  class="info-btn"
  (click)="toggle()"
  [attr.aria-expanded]="open()"
  aria-label="Image information">i</button>
@if (open()) {
  <div class="info-panel">
    <div class="info-row"><span class="info-key">Image</span><span class="info-val">{{ info().index }}</span></div>
    <div class="info-row"><span class="info-key">File</span><span class="info-val">{{ info().file }}</span></div>
    <div class="info-row"><span class="info-key">Link</span><a class="info-val" [href]="info().permalink">{{ info().permalink }}</a></div>
    <div class="info-row"><span class="info-key">Size</span><span class="info-val">{{ info().dims }}</span></div>
    <div class="info-row"><span class="info-key">Pixels</span><span class="info-val">{{ info().mp }}</span></div>
    <div class="info-row"><span class="info-key">Aspect</span><span class="info-val">{{ info().aspect }}</span></div>
  </div>
}
