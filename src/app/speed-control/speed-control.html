<!-- right-side vertical slider: seconds per slide -->
<div class="speed">
  <span class="speed-val">{{ holdSeconds().toFixed(1) }}s</span>
  <input
    #spd
    type="range"
    min="0.1"
    max="2"
    step="0.1"
    [value]="holdSeconds()"
    (input)="changed.emit(spd.value)"
    aria-label="Seconds per slide" />
</div>
